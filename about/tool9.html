<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色拾取器</title>
    <style>
        body{padding:20px;text-align:center}
        input{margin:10px}
        #c{width:100px;height:100px;margin:10px auto}
    </style>
</head>
<body>
<h3>颜色拾取器</h3>
<input type="color" oninput="pick()" id="i">
<div id="c"></div>
<p id="hex"></p>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "515a0910ac434bb3aec4ff0f9da92a0f"}'></script><!-- End Cloudflare Web Analytics -->
<script>
    function pick(){
        let v = document.getElementById('i').value
        document.getElementById('c').style.background = v
        document.getElementById('hex').textContent = v
    }
</script>
</body>
</html>
