<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字数统计</title>
    <style>
        body{padding:20px;text-align:center}
        textarea{width:100%;height:150px;margin:10px 0;padding:10px}
    </style>
</head>
<body>
<h3>字数统计</h3>
<textarea oninput="count()"></textarea>
<p>字数：<span id="num">0</span></p>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "515a0910ac434bb3aec4ff0f9da92a0f"}'></script><!-- End Cloudflare Web Analytics -->
<script>
    function count(){
        let v = document.querySelector('textarea').value
        document.getElementById('num').textContent = v.length
    }
</script>
</body>
</html>
