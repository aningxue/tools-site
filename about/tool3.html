<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字数统计 - 免费在线文本处理工具</title>
    <meta name="description" content="免费在线字数统计工具，本地处理保护隐私，实时统计输入文本的字符数量，包含空格、标点符号等所有字符，无需联网即可使用。">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            padding:20px;
            max-width:800px;
            margin:0 auto;
            font-family:'Microsoft YaHei', Arial, sans-serif;
            background-color:#f8f9fa;
            color:#333;
            text-align:center;
        }
        header{
            margin-bottom:30px;
            padding-bottom:20px;
            border-bottom:1px solid #eee;
        }
        h3{
            font-size:24px;
            color:#2c3e50;
            margin-bottom:15px;
        }
        .tool-desc{
            font-size:16px;
            color:#666;
            line-height:1.6;
            margin-bottom:20px;
            max-width:600px;
            margin-left:auto;
            margin-right:auto;
        }
        .privacy-tip{
            color:#e74c3c;
            font-size:14px;
            margin:10px 0;
            padding:10px;
            background:#ffeaea;
            border-radius:8px;
            display:inline-block;
        }
        textarea{
            width:100%;
            height:180px;
            margin:10px 0;
            padding:15px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
            resize:vertical;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }
        .count-result{
            margin:20px 0;
            padding:15px;
            background:white;
            border-radius:8px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
            font-size:18px;
            color:#2c3e50;
        }
        .back-home{
            display:inline-block;
            margin-top:30px;
            padding:10px 20px;
            background:#3498db;
            color:white;
            border-radius:8px;
            text-decoration:none;
            box-shadow:0 2px 6px rgba(52,152,219,0.2);
        }
        .back-home:hover{
            background:#2980b9;
        }
        footer{
            text-align:center;
            margin-top:40px;
            padding-top:20px;
            border-top:1px solid #eee;
            color:#999;
            font-size:14px;
        }
    </style>
</head>
<body>
<header>
    <h3>免费在线字数统计工具</h3>
    <p class="tool-desc">本工具可实时统计输入文本的字符总数，包含中文、英文、数字、空格、标点符号等所有字符类型。所有统计操作均在本地浏览器完成，不会上传您的文本内容，保护隐私安全。</p>
    <p class="privacy-tip">✅ 文本内容仅在本地处理，无任何数据上传</p>
</header>

<textarea id="textInput" placeholder="请输入需要统计字数的文本内容..."></textarea>
<div class="count-result">当前字符总数：<span id="charCount">0</span></div>

<br>
<a class="back-home" href="../index.html">返回工具首页</a>

<footer>
    <p>字数统计工具实时更新字符数量，包含所有输入字符 | 隐私保障：本地处理，无数据上传</p>
</footer>

<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "515a0910ac434bb3aec4ff0f9da92a0f"}'></script>
<!-- End Cloudflare Web Analytics -->

<script>
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');

    // 实时统计字数
    textInput.addEventListener('input', function() {
        charCount.textContent = this.value.length;
    });
</script>
</body>
</html>
