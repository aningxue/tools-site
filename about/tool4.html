        body{
            padding:20px;
            max-width:800px;
            margin:0 auto;
            font-family:'Microsoft YaHei', Arial, sans-serif;
            background-color:#f8f9fa;
            color:#333;
            text-align:center;
        }
        header{
            margin-bottom:30px;
            padding-bottom:20px;
            border-bottom:1px solid #eee;
        }
        h3{
            font-size:24px;
            color:#2c3e50;
            margin-bottom:15px;
        }
        .tool-desc{
            font-size:16px;
            color:#666;
            line-height:1.6;

        textarea{

            border-radius:8px;
            font-size:16px;
            resize:vertical;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }
        button{
            padding:12px 24px;
            background:#3498db;
            color:white;
            border:none;

            display:inline-block;
            margin-top:30px;
            padding:10px 20px;

            color:white;
            border-radius:8px;
            text-decoration:none;
            box-shadow:0 2px 6px rgba(46,204,113,0.2);

</head>
<body>
<header>
    <h3>免费在线文本翻转工具</h3>
    <p class="tool-desc">本工具可将输入的任意文本内容（中英文、数字、符号、空格等）按字符顺序反转，所有处理均在本地浏览器完成，不会上传您的文本内容，保护隐私安全。操作简单，点击按钮即可生成翻转结果。</p>

<textarea id="inputText" placeholder="请输入需要翻转的文本内容..."></textarea>
<br>
<button onclick="reverseText()">翻转文本</button>
<div id="output">翻转结果将显示在这里...</div>

<br>
<a class="back-home" href="../index.html">返回工具首页</a>

<script>
    function reverseText() {
        const input = document.getElementById('inputText').value;
        // 翻转文本
        const reversed = input.split('').reverse().join('');
        document.getElementById('output').textContent = reversed;
    }
</script>
