<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩</title>
    <style>
        body{padding:20px;text-align:center}
        canvas{border:1px solid #ccc;margin:10px auto}
    </style>
</head>
<body>
<h3>图片压缩</h3>
<input type="file" accept="image/*" onchange="compress(this)">
<br>
<canvas id="can" width="300" height="300"></canvas>
<a id="dl" download="compress.jpg">下载图片</a>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "515a0910ac434bb3aec4ff0f9da92a0f"}'></script><!-- End Cloudflare Web Analytics -->
<script>
    function compress(input) {
        const f = input.files[0]
        const img = new Image()
        img.src = URL.createObjectURL(f)
        img.onload = function() {
            const can = document.getElementById('can')
            const ctx = can.getContext('2d')
            ctx.drawImage(img,0,0,300,300)
            dl.href = can.toDataURL('image/jpeg', 0.6)
        }
    }
</script>
</body>
</html>
