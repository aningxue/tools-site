<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成</title>
    <style>
        body{padding:20px;text-align:center}
        input{width:250px;margin:10px}
        img{margin-top:20px}
    </style>
</head>
<body>
<h3>二维码生成</h3>
<input id="txt" placeholder="输入内容">
<button onclick="qrc()">生成</button>
<br>
<img id="q">
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "515a0910ac434bb3aec4ff0f9da92a0f"}'></script><!-- End Cloudflare Web Analytics -->
<script>
    function qrc(){
        let t = document.getElementById('txt').value
        document.getElementById('q').src =
            `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${t}`
    }
</script>
</body>
</html>
